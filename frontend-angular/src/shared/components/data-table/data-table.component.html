<div class="table-wrapper">
  <!-- Search -->
  <div class="table-toolbar">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>{{ searchPlaceholder }}</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input matInput [(ngModel)]="searchValue" (ngModelChange)="applyFilter()" />
    </mat-form-field>
  </div>

  <!-- Loading -->
  <div class="loading-overlay" *ngIf="loading">
    <mat-spinner diameter="40" />
  </div>

  <!-- Table -->
  <div class="table-container" [class.blurred]="loading">
    <table mat-table [dataSource]="dataSource" matSort>

      <ng-container *ngFor="let col of columns" [matColumnDef]="col.key">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ col.label }}</th>

        <td mat-cell *matCellDef="let row">

          <!-- Badge type -->
          <ng-container *ngIf="col.type === 'badge'">
            <span class="badge" [ngClass]="row[col.key] ? 'active' : 'inactive'">
              {{ row[col.key] ? 'Active' : 'Inactive' }}
            </span>
          </ng-container>

          <!-- Currency type -->
          <ng-container *ngIf="col.type === 'currency'">
           ₹{{ row[col.key] | number:'1.2-2' }}
          </ng-container>

          <!-- Date type -->
          <ng-container *ngIf="col.type === 'date'">
            {{ row[col.key] | date: 'dd MMM yyyy, HH:mm' }}
          </ng-container>

          <!-- Actions type -->
          <ng-container *ngIf="col.type === 'actions'">
            <div class="actions-cell">
              <button
                *ngFor="let act of col.actions"
                mat-icon-button
                [style.color]="act.color || 'inherit'"
                [matTooltip]="act.label"
                (click)="onAction(act.action, row)"
              >
                <mat-icon>{{ act.icon }}</mat-icon>
              </button>
            </div>
          </ng-container>

          <!-- Default text type -->
          <ng-container *ngIf="!col.type || col.type === 'text'">
            {{ row[col.key] }}
          </ng-container>

        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row no-data-row" *matNoDataRow>
        <td [attr.colspan]="displayedColumns.length" class="no-data-cell">
          <mat-icon>inbox</mat-icon>
          <span>No data found</span>
        </td>
      </tr>

    </table>
  </div>

  <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons />
</div>
