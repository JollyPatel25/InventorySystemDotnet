<h2 mat-dialog-title>Update Stock</h2>

<mat-dialog-content>
  <div class="product-info">
    <span class="product-name">{{ data.productName }}</span>
    <span class="product-meta">SKU: {{ data.sku }} &nbsp;|&nbsp; Current Qty: <strong>{{ data.quantity }}</strong></span>
  </div>

  <form [formGroup]="form" class="form-grid">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Adjustment Type</mat-label>
      <mat-select formControlName="adjustmentType">
        <mat-option *ngFor="let t of adjustmentTypes" [value]="t.value">
          {{ t.label }}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('adjustmentType')?.hasError('required')">Required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Quantity</mat-label>
      <input matInput type="number" formControlName="quantityChanged" />
      <mat-hint>Enter a positive number — direction is determined by adjustment type</mat-hint>
      <mat-error *ngIf="form.get('quantityChanged')?.hasError('required')">Required</mat-error>
      <mat-error *ngIf="form.get('quantityChanged')?.hasError('min')">Must be >= 1</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Reason</mat-label>
      <textarea matInput formControlName="reason" rows="3"></textarea>
      <mat-error *ngIf="form.get('reason')?.hasError('required')">Required</mat-error>
    </mat-form-field>

  </form>

  <p class="error-msg" *ngIf="error">{{ error }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="null">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="loading">
    <mat-spinner diameter="18" *ngIf="loading"></mat-spinner>
    <span *ngIf="!loading">Update Stock</span>
  </button>
</mat-dialog-actions>
