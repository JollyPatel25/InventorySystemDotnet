<app-page-header title="Sales" subtitle="View sales for your assigned warehouses" />

<div class="warehouse-selector">
  <mat-form-field appearance="outline">
    <mat-label>Select Warehouse</mat-label>
    <mat-select [(ngModel)]="selectedWarehouseId" (ngModelChange)="onWarehouseChange()">
      <mat-option *ngFor="let w of warehouses" [value]="w.id">{{ w.name }} ({{ w.code }})</mat-option>
    </mat-select>
  </mat-form-field>
</div>

<app-data-table
  *ngIf="selectedWarehouseId"
  [columns]="columns"
  [data]="sales"
  [loading]="loading"
  searchPlaceholder="Search sales..."
/>

<div class="empty-state" *ngIf="!selectedWarehouseId">
  <p>Select a warehouse to view sales.</p>
</div>
