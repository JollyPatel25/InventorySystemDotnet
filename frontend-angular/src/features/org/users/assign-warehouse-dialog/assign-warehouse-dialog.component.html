<h2 mat-dialog-title>Assign Warehouse</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="form-col">

    <mat-form-field appearance="outline">
      <mat-label>Warehouse</mat-label>
      <mat-select formControlName="warehouseId">
        <mat-option *ngFor="let w of warehouses" [value]="w.id">
          {{ w.name }} ({{ w.code }})
        </mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('warehouseId')?.hasError('required')">Required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Access Level</mat-label>
      <mat-select formControlName="accessLevel">
        <mat-option *ngFor="let a of accessLevels" [value]="a">{{ a }}</mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('accessLevel')?.hasError('required')">Required</mat-error>
    </mat-form-field>

  </form>
  <p class="error-msg" *ngIf="error">{{ error }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="null">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="loading">
    <mat-spinner diameter="18" *ngIf="loading"></mat-spinner>
    <span *ngIf="!loading">Assign</span>
  </button>
</mat-dialog-actions>
