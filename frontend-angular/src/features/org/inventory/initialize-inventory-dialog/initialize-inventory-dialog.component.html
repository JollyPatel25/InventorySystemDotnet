<h2 mat-dialog-title>Initialize Inventory</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="form-grid">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Product</mat-label>
      <mat-select formControlName="productId">
        <mat-option *ngIf="productsLoading" disabled>Loading products...</mat-option>
        <mat-option *ngFor="let p of products" [value]="p.id">
          {{ p.name }} — {{ p.sku }}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('productId')?.hasError('required')">Required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Initial Quantity</mat-label>
      <input matInput type="number" formControlName="initialQuantity" />
      <mat-error *ngIf="form.get('initialQuantity')?.hasError('required')">Required</mat-error>
      <mat-error *ngIf="form.get('initialQuantity')?.hasError('min')">Must be >= 0</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Low Stock Threshold</mat-label>
      <input matInput type="number" formControlName="lowStockThreshold" />
      <mat-hint>Alert when quantity drops below this value</mat-hint>
      <mat-error *ngIf="form.get('lowStockThreshold')?.hasError('required')">Required</mat-error>
      <mat-error *ngIf="form.get('lowStockThreshold')?.hasError('min')">Must be >= 1</mat-error>
    </mat-form-field>

  </form>

  <p class="error-msg" *ngIf="error">{{ error }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="null">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="loading">
    <mat-spinner diameter="18" *ngIf="loading"></mat-spinner>
    <span *ngIf="!loading">Initialize</span>
  </button>
</mat-dialog-actions>
