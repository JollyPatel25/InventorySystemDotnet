<h2 mat-dialog-title>{{ isEdit ? 'Edit Warehouse' : 'Create Warehouse' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="form-grid">

    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" />
      <mat-error *ngIf="form.get('name')?.hasError('required')">Required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Code</mat-label>
      <input matInput formControlName="code" />
      <mat-error *ngIf="form.get('code')?.hasError('required')">Required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Location</mat-label>
      <input matInput formControlName="location" />
    </mat-form-field>

    <div class="section-label full-width">Address</div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Address Line 1</mat-label>
      <input matInput formControlName="line1" />
      <mat-error *ngIf="form.get('line1')?.hasError('required')">Required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Address Line 2</mat-label>
      <input matInput formControlName="line2" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>City</mat-label>
      <input matInput formControlName="city" />
      <mat-error *ngIf="form.get('city')?.hasError('required')">Required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>State</mat-label>
      <input matInput formControlName="state" />
      <mat-error *ngIf="form.get('state')?.hasError('required')">Required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Country</mat-label>
      <input matInput formControlName="country" />
      <mat-error *ngIf="form.get('country')?.hasError('required')">Required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Postal Code</mat-label>
      <input matInput formControlName="postalCode" />
      <mat-error *ngIf="form.get('postalCode')?.hasError('required')">Required</mat-error>
    </mat-form-field>

  </form>

  <p class="error-msg" *ngIf="error">{{ error }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="null">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="loading">
    <mat-spinner diameter="18" *ngIf="loading"></mat-spinner>
    <span *ngIf="!loading">{{ isEdit ? 'Update' : 'Create' }}</span>
  </button>
</mat-dialog-actions>
