<h2 mat-dialog-title>{{ isEdit ? 'Edit Product' : 'Create Product' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="form-grid">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" />
      <mat-error *ngIf="form.get('name')?.hasError('required')">Required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>SKU</mat-label>
      <input matInput formControlName="sku" />
      <mat-error *ngIf="form.get('sku')?.hasError('required')">Required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Category</mat-label>
      <input matInput formControlName="category" />
      <mat-error *ngIf="form.get('category')?.hasError('required')">Required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Price</mat-label>
      <input matInput type="number" formControlName="price" />
      <mat-error *ngIf="form.get('price')?.hasError('required')">Required</mat-error>
      <mat-error *ngIf="form.get('price')?.hasError('min')">Must be >= 0</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Unit of Measure</mat-label>
      <mat-select formControlName="unitOfMeasure">
        <mat-option *ngFor="let u of units" [value]="u">{{ u }}</mat-option>
      </mat-select>
      <mat-error *ngIf="form.get('unitOfMeasure')?.hasError('required')">Required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Barcode</mat-label>
      <input matInput formControlName="barcode" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3"></textarea>
    </mat-form-field>

  </form>

  <p class="error-msg" *ngIf="error">{{ error }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="null">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="loading">
    <mat-spinner diameter="18" *ngIf="loading"></mat-spinner>
    <span *ngIf="!loading">{{ isEdit ? 'Update' : 'Create' }}</span>
  </button>
</mat-dialog-actions>
