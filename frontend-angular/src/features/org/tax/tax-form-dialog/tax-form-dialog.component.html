<h2 mat-dialog-title>Add Tax Configuration</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="form-grid">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Tax Name</mat-label>
      <input matInput formControlName="taxName" placeholder="e.g. GST, VAT" />
      <mat-error *ngIf="form.get('taxName')?.hasError('required')">Required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Tax Percentage</mat-label>
      <input matInput type="number" formControlName="taxPercentage" />
      <span matTextSuffix>%</span>
      <mat-error *ngIf="form.get('taxPercentage')?.hasError('required')">Required</mat-error>
      <mat-error *ngIf="form.get('taxPercentage')?.hasError('min')">Must be >= 0</mat-error>
      <mat-error *ngIf="form.get('taxPercentage')?.hasError('max')">Must be <= 100</mat-error>
    </mat-form-field>

  </form>

  <p class="error-msg" *ngIf="error">{{ error }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="null">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="loading">
    <mat-spinner diameter="18" *ngIf="loading"></mat-spinner>
    <span *ngIf="!loading">Create</span>
  </button>
</mat-dialog-actions>
